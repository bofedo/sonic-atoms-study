<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sonic Atoms — Perception Study</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #6366f1;
  --accent2: #a5b4fc;
  --text: #e2e8f0;
  --muted: #64748b;
  --border: #334155;
  --ok: #22c55e;
  --warn: #f59e0b;
  --err: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex;
  align-items: flex-start; justify-content: center;
  padding: 1.5rem 1rem;
}
.sa-card {
  background: var(--card); border-radius: 16px;
  padding: 2rem; width: 100%; max-width: 680px;
  margin: 0 auto;
}
.sa-card h2 { font-size: 1.25rem; color: #f1f5f9; margin-bottom: .5rem; }
.sa-card p, .sa-card li { color: #cbd5e1; font-size: .9rem; line-height: 1.65; }
.sa-card ul { padding-left: 1.3rem; margin-top: .5rem; }

.sa-progress { background: var(--border); border-radius: 99px; height: 5px; margin-bottom: 1.2rem; overflow: hidden; }
.sa-progress-bar { background: var(--accent); height: 5px; border-radius: 99px; transition: width .4s; }

.sa-section-header {
  border-left: 3px solid var(--accent);
  padding: .4rem 0 .4rem .8rem;
  margin-bottom: 1.2rem;
}
.sa-section-header .sa-section-tag {
  font-size: .7rem; color: var(--accent2); text-transform: uppercase;
  letter-spacing: .08em; font-weight: 600; margin-bottom: .15rem;
}
.sa-section-header h3 { font-size: 1rem; color: #f1f5f9; font-weight: 600; }

.sa-mini-player {
  background: #0f172a; border: 1px solid var(--border);
  border-radius: 10px; padding: .8rem 1rem;
  display: flex; align-items: center; gap: .8rem;
  margin-bottom: 1.2rem;
}
.sa-mini-play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  font-size: 1rem; color: white; flex-shrink: 0;
  transition: background .2s; display: flex;
  align-items: center; justify-content: center;
}
.sa-mini-play-btn:hover { background: #4f46e5; }
.sa-mini-label { font-size: .75rem; color: var(--muted); }
.sa-mini-label strong { color: var(--accent2); font-size: .78rem; }
.sa-mini-waveform {
  flex: 1; height: 24px; background: var(--border);
  border-radius: 4px; overflow: hidden;
}
.sa-mini-waveform-fill {
  height: 100%; background: var(--accent);
  opacity: .3; width: 0%; transition: width .1s linear;
}

.sa-player {
  background: #0f172a; border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.2rem;
  display: flex; align-items: center; gap: 1rem;
  margin: 1rem 0;
}
.sa-play-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  font-size: 1.1rem; color: white; flex-shrink: 0;
  transition: background .2s; display: flex;
  align-items: center; justify-content: center;
}
.sa-play-btn:hover { background: #4f46e5; }
.sa-play-btn:disabled { background: var(--border); cursor: not-allowed; }
.sa-waveform { flex: 1; height: 32px; background: var(--border); border-radius: 6px; overflow: hidden; }
.sa-waveform-fill { height: 100%; background: var(--accent); opacity: .3; width: 0%; transition: width .1s linear; }
.sa-play-hint { font-size: .75rem; color: var(--muted); text-align: center; margin-bottom: .6rem; }

.sa-scale-block { margin-bottom: 1.2rem; }
.sa-scale-label { font-size: .75rem; color: var(--accent2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; font-weight: 600; }
.sa-likert { display: flex; align-items: center; gap: .4rem; }
.sa-likert-anchor { font-size: .75rem; color: var(--muted); white-space: nowrap; min-width: 65px; }
.sa-likert-anchor.right { text-align: right; }
.sa-likert-options { display: flex; gap: .3rem; flex: 1; justify-content: center; }
.sa-likert-options input[type=radio] { display: none; }
.sa-likert-options label {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; color: var(--muted);
  cursor: pointer; transition: all .15s; user-select: none;
}
.sa-likert-options input[type=radio]:checked + label { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
.sa-likert-options label:hover { border-color: var(--accent2); color: var(--accent2); }

.sa-training-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin: .8rem 0; }
.sa-training-card {
  background: #0f172a; border-radius: 10px; padding: .8rem;
  border: 1px solid var(--border); text-align: center;
}
.sa-training-card .tc-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
.sa-training-card .tc-val { font-size: 1.1rem; font-weight: 700; margin-bottom: .4rem; }
.sa-training-card .tc-desc { font-size: .75rem; color: var(--muted); }
.sa-training-card.extreme-low .tc-val { color: #ef4444; }
.sa-training-card.extreme-high .tc-val { color: #22c55e; }

.sa-attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; margin-top: .5rem; }
.sa-attr-btn {
  padding: .5rem .7rem; border-radius: 8px;
  border: 2px solid var(--border); background: transparent;
  color: var(--text); font-size: .82rem; cursor: pointer;
  text-align: left; transition: all .15s;
}
.sa-attr-btn:hover { border-color: var(--accent2); }
.sa-attr-btn.selected { border-color: var(--accent); background: #1e2a4a; color: white; }
.sa-attr-btn.positive { border-left: 3px solid var(--ok); }
.sa-attr-btn.neutral  { border-left: 3px solid var(--muted); }
.sa-attr-btn.negative { border-left: 3px solid var(--err); }
.sa-attr-btn.escape   { border-left: 3px solid var(--warn); }

.sa-confidence { display: flex; align-items: center; gap: .8rem; margin-top: .6rem; padding: .5rem .8rem; background: #0f172a; border-radius: 8px; }
.sa-confidence span { font-size: .78rem; color: var(--muted); white-space: nowrap; }
.sa-conf-options { display: flex; gap: .3rem; }
.sa-conf-options input[type=radio] { display: none; }
.sa-conf-options label { padding: .25rem .55rem; border-radius: 6px; border: 1px solid var(--border); font-size: .75rem; color: var(--muted); cursor: pointer; transition: all .15s; }
.sa-conf-options input[type=radio]:checked + label { background: var(--accent); border-color: var(--accent); color: white; }

.sa-ux-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .4rem; margin-top: .5rem; }
.sa-ux-btn { padding: .5rem; border-radius: 8px; border: 2px solid var(--border); background: transparent; color: var(--text); font-size: .8rem; cursor: pointer; text-align: center; transition: all .15s; }
.sa-ux-btn:hover { border-color: var(--accent2); }
.sa-ux-btn.selected { border-color: var(--accent); background: #1e2a4a; }

.sa-select {
  width: 100%; padding: .55rem .8rem; background: #0f172a;
  color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; font-size: .88rem; margin-top: .4rem;
  appearance: none;
}
.sa-select:focus { outline: 2px solid var(--accent); }

.sa-submit {
  width: 100%; padding: .7rem; background: var(--accent);
  color: white; border: none; border-radius: 10px;
  font-size: .92rem; font-weight: 600; cursor: pointer;
  transition: background .2s; margin-top: 1rem;
}
.sa-submit:hover:not(:disabled) { background: #4f46e5; }
.sa-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.sa-hp-options { display: flex; gap: .8rem; margin-top: 1rem; flex-wrap: wrap; }
.sa-hp-btn { flex: 1; min-width: 80px; padding: .65rem; border-radius: 10px; border: 2px solid var(--border); background: transparent; color: var(--text); font-size: .88rem; cursor: pointer; text-align: center; transition: all .15s; }
.sa-hp-btn:hover { border-color: var(--accent2); }
.sa-hp-btn.selected { border-color: var(--accent); background: #1e2a4a; }

.sa-vol-options { display: flex; gap: .6rem; margin-top: 1rem; flex-wrap: wrap; }
.sa-vol-btn { flex: 1; padding: .55rem; border-radius: 8px; border: 2px solid var(--border); background: transparent; color: var(--text); font-size: .83rem; cursor: pointer; text-align: center; transition: all .15s; }
.sa-vol-btn:hover { border-color: var(--accent2); }
.sa-vol-btn.selected { border-color: var(--accent); background: #1e2a4a; }
.sa-attention-options { display: flex; gap: .6rem; margin-top: 1rem; flex-wrap: wrap; }
.sa-attention-btn { padding: .5rem 1rem; border-radius: 8px; border: 2px solid var(--border); background: transparent; color: var(--text); font-size: .88rem; cursor: pointer; transition: all .15s; }
.sa-attention-btn:hover { border-color: var(--accent2); }
.sa-attention-btn.selected { border-color: var(--accent); background: #1e2a4a; }

.sa-divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }

.sa-rest { text-align: center; padding: 1rem 0; }
.sa-rest .big { font-size: 2.2rem; margin-bottom: .5rem; }

.sa-train-play {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .4rem .9rem; border-radius: 8px;
  background: #1e2a4a; border: 1px solid var(--accent);
  color: var(--accent2); font-size: .8rem; cursor: pointer;
  transition: background .2s; margin-top: .5rem;
}
.sa-train-play:hover { background: #263a5e; }

.sa-error-box {
  background: #450a0a; color: #fca5a5; border-radius: 8px;
  padding: .7rem 1rem; font-size: .85rem; margin-top: .8rem;
  display: none;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const CONFIG = {
  audioBase: 'https://pub-e597382e71d24ba2a9ec99f1249c6c55.r2.dev/',
  backendURL: 'https://app.doremifo.com/responses',
  cells: ['01','02','03','04','05','06','07','08','09','10'],
  vars:  ['01','02','03','04','05','06','07','08','09','10'],
  stimPerParticipant: 3,
  duplicateCells: ['01','05','10'],
  semDiffScales: [
    { id:'soft_hard',    left:'Soft',   right:'Hard'    },
    { id:'dark_bright',  left:'Dark',   right:'Bright'  },
    { id:'smooth_rough', left:'Smooth', right:'Rough'   },
    { id:'simple_complex', left:'Simple', right:'Complex' },
  ],
  attributes: [
    { id:'premium',    label:'Premium',    type:'positive' },
    { id:'trustworthy',label:'Trustworthy',type:'positive' },
    { id:'dynamic',    label:'Dynamic',    type:'positive' },
    { id:'fresh',      label:'Fresh',      type:'positive' },
    { id:'generic',    label:'Generic',    type:'neutral'  },
    { id:'functional', label:'Functional', type:'neutral'  },
    { id:'cheap',      label:'Cheap',      type:'negative' },
    { id:'irritating', label:'Irritating', type:'negative' },
    { id:'none',       label:"Can't assign",type:'escape'  },
  ],
  uxAffordances: ['Success','Error','Warning','Message','Loading',"Don't know"],
  hugginsCorrect: null,
};

const params = new URLSearchParams(window.location.search);

const STATE = {
  prolificPID: params.get('PROLIFIC_PID') || null,
  studyID:     params.get('STUDY_ID') || params.get('UTM_SOURCE') || 'SOCIAL',
  sessionID:   params.get('SESSION_ID') || crypto.randomUUID(),
  source:      params.get('PROLIFIC_PID') ? 'prolific' : 'social',
  sensitivity: null,
  headphoneFlag: false,
  attentionFlag: false,
  terminated: false,
  stimulusOrder: [], duplicateSource: null,
  responses: [], currentAtomIdx: 0,
  attentionCheckIdx: null, semDiffAssignment: [],
  postTest: {},
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function audioURL(cell, v) { return `${CONFIG.audioBase}CELL${cell}_VAR${v}.wav`; }

function buildStimulusOrder() {
  const allCells = shuffle([...CONFIG.cells]);
  const picked = allCells.slice(0, CONFIG.stimPerParticipant).map(cell => ({
    cell, var: CONFIG.vars[Math.floor(Math.random()*CONFIG.vars.length)]
  }));
  const stable = picked.filter(s => CONFIG.duplicateCells.includes(s.cell));
  const dupSource = stable.length > 0 ? stable[Math.floor(Math.random()*stable.length)] : picked[0];
  STATE.duplicateSource = dupSource;
  STATE.stimulusOrder = [...picked, {...dupSource, isDuplicate: true}];
  STATE.attentionCheckIdx = 1;
  const scales4 = [0,1,2,3];
  STATE.semDiffAssignment = STATE.stimulusOrder.map(() => { const s=shuffle(scales4); return [s[0],s[1]]; });
}

function buildResponse(atomIdx, data) {
  const stim = STATE.stimulusOrder[atomIdx];
  return { prolific_pid: STATE.prolificPID, study_id: STATE.studyID, session_id: STATE.sessionID,
    atom_index: atomIdx, cell: stim.cell, var: stim.var, is_duplicate: stim.isDuplicate||false,
    ...data, timestamp: Date.now() };
}

buildStimulusOrder();

// ── AUDIO ENGINE ──────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function generateHugginsStimuli() {
  const ctx = getAudioCtx(), dur = 1.5, sr = ctx.sampleRate, buffers = [];
  const correctIdx = Math.floor(Math.random()*3);
  CONFIG.hugginsCorrect = correctIdx + 1;
  for (let s=0; s<3; s++) {
    const buf = ctx.createBuffer(2, sr*dur, sr);
    const L = buf.getChannelData(0), R = buf.getChannelData(1);
    for (let i=0; i<L.length; i++) { const n=(Math.random()*2-1)*0.3; L[i]=n; R[i]=n; }
    if (s===correctIdx) {
      for (let i=0; i<L.length; i++) { const t=i/sr, tone=Math.sin(2*Math.PI*600*t)*0.15; L[i]+=tone; R[i]-=tone; }
    }
    buffers.push(buf);
  }
  return buffers;
}

function playTrainingTone(type) {
  const ctx = getAudioCtx();
  if (ctx.state==='suspended') ctx.resume();
  const osc = ctx.createOscillator(), gain = ctx.createGain();

  if (type==='pleasant') {
    [261.6, 329.6, 392].forEach(f => {
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.frequency.value = f; o2.type = 'sine';
      o2.connect(g2); g2.connect(ctx.destination);
      const t = ctx.currentTime;
      g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.12, t+0.05);
      g2.gain.setValueAtTime(0.12, t+1.5); g2.gain.linearRampToValueAtTime(0, t+1.8);
      o2.start(t); o2.stop(t+1.8);
    });
    return;
  }
  if (type==='unpleasant') {
    [220, 233, 247, 440, 466].forEach((f,i) => {
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.frequency.value = f; o2.type = i%2===0 ? 'sawtooth' : 'square';
      o2.connect(g2); g2.connect(ctx.destination);
      const t = ctx.currentTime;
      g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.05, t+0.01);
      g2.gain.setValueAtTime(0.05, t+1.5); g2.gain.linearRampToValueAtTime(0, t+1.7);
      o2.start(t); o2.stop(t+1.7);
    });
    return;
  }
  if (type==='calm') {
    osc.frequency.value = 180; osc.type = 'sine';
    osc.connect(gain); gain.connect(ctx.destination);
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.15, t+0.3);
    gain.gain.setValueAtTime(0.15, t+2.5); gain.gain.linearRampToValueAtTime(0, t+3.5);
    osc.start(t); osc.stop(t+3.5);
    return;
  }
  if (type==='exciting') {
    for (let i=0; i<8; i++) {
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.frequency.value = 440 + (i%2)*220; o2.type = 'square';
      o2.connect(g2); g2.connect(ctx.destination);
      const t = ctx.currentTime + i*0.15;
      g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.08, t+0.02);
      g2.gain.setValueAtTime(0.08, t+0.1); g2.gain.linearRampToValueAtTime(0, t+0.13);
      o2.start(t); o2.stop(t+0.14);
    }
    return;
  }
  if (type==='avoid') {
    [55, 58].forEach(f => {
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.frequency.value = f; o2.type = 'sawtooth';
      o2.connect(g2); g2.connect(ctx.destination);
      const t = ctx.currentTime;
      g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.1, t+0.1);
      g2.gain.setValueAtTime(0.1, t+2); g2.gain.linearRampToValueAtTime(0, t+2.5);
      o2.start(t); o2.stop(t+2.5);
    });
    return;
  }
  if (type==='approach') {
    [880, 1100, 1320].forEach((f,i) => {
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.frequency.value = f; o2.type = 'sine';
      o2.connect(g2); g2.connect(ctx.destination);
      const t = ctx.currentTime + i*0.1;
      g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.12, t+0.02);
      g2.gain.exponentialRampToValueAtTime(0.001, t+0.35);
      o2.start(t); o2.stop(t+0.35);
    });
    return;
  }
}

// ── AUDIO PLAYBACK ────────────────────────────────────
let currentAudio = null, audioGateTimer = null, audioGatePassed = {};
let miniPlayerRef = {};

function handlePlay(atomIdx, url) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const btn = document.getElementById(`playBtn_${atomIdx}`);
  const fill = document.getElementById(`wfill_${atomIdx}`);
  if (!btn) return;
  const audio = new Audio(url);
  currentAudio = audio;
  btn.textContent = '⏸';
  btn.onclick = () => { audio.pause(); btn.textContent='▶'; btn.onclick=()=>handlePlay(atomIdx,url); };
  if (fill) { audio.addEventListener('timeupdate', () => { if (audio.duration) fill.style.width=(audio.currentTime/audio.duration*100)+'%'; }); }
  audio.addEventListener('ended', () => { btn.textContent='▶'; btn.onclick=()=>handlePlay(atomIdx,url); if(fill) fill.style.width='100%'; syncMiniPlayers(atomIdx, false); });
  audio.play().catch(e => console.warn('Audio error:', e));
  syncMiniPlayers(atomIdx, true);
  if (atomIdx !== 'baseline' && !audioGatePassed[atomIdx]) {
    clearTimeout(audioGateTimer);
    audioGateTimer = setTimeout(() => { audioGatePassed[atomIdx]=true; checkSubmitReady(atomIdx); }, 2000);
  }
}

function syncMiniPlayers(atomIdx, playing) {
  document.querySelectorAll(`[data-mini-atom="${atomIdx}"]`).forEach(btn => {
    btn.textContent = playing ? '⏸' : '▶';
  });
}

function handleMiniPlay(atomIdx, url) { handlePlay(atomIdx, url); }

function playBaselineTone() {
  const ctx = getAudioCtx();
  if (ctx.state==='suspended') ctx.resume();
  const btn = document.getElementById('playBtn_baseline');
  const fill = document.getElementById('wfill_baseline');
  const dur = 2.0, osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type='sine'; osc.frequency.value=440;
  osc.connect(gain); gain.connect(ctx.destination);
  const t = ctx.currentTime;
  gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.18, t+0.15);
  gain.gain.setValueAtTime(0.18, t+dur-0.2); gain.gain.linearRampToValueAtTime(0, t+dur);
  osc.start(t); osc.stop(t+dur);
  btn.textContent='⏸'; btn.disabled=true;
  const startMs = performance.now();
  const tick = () => { const pct=Math.min((performance.now()-startMs)/(dur*1000)*100,100); if(fill) fill.style.width=pct+'%'; if(pct<100) requestAnimationFrame(tick); };
  requestAnimationFrame(tick);
  osc.onended = () => { btn.textContent='▶'; btn.disabled=false; if(fill) fill.style.width='100%'; document.getElementById('volOpts').style.display='flex'; document.getElementById('baselineNext').disabled=!volSelected; };
}

// ── RENDER HELPERS ────────────────────────────────────
function renderLikert(id, left, right, n, label) {
  const opts = Array.from({length:n},(_,i)=>`<input type="radio" name="${id}" id="${id}_${i+1}" value="${i+1}"><label for="${id}_${i+1}">${i+1}</label>`).join('');
  return `<div class="sa-scale-block"><div class="sa-scale-label">${label}</div><div class="sa-likert"><span class="sa-likert-anchor">${left}</span><div class="sa-likert-options">${opts}</div><span class="sa-likert-anchor right">${right}</span></div></div>`;
}

function renderMiniPlayer(atomIdx, url, label) {
  const idxExpr = typeof atomIdx==='string' ? `'${atomIdx}'` : atomIdx;
  return `<div class="sa-mini-player">
    <button class="sa-mini-play-btn" data-mini-atom="${atomIdx}" onclick="handleMiniPlay(${idxExpr},'${url}')">▶</button>
    <div><div class="sa-mini-label"><strong>Replay sound</strong>${label?' · '+label:''}</div></div>
    <div class="sa-mini-waveform"><div class="sa-mini-waveform-fill" id="miniwf_${atomIdx}"></div></div>
  </div>`;
}

function renderAudioPlayer(url, atomIdx) {
  const idxExpr = typeof atomIdx==='string' ? `'${atomIdx}'` : atomIdx;
  return `<p class="sa-play-hint">Press ▶ to listen — Submit unlocks after 2 seconds.</p>
  <div class="sa-player">
    <button class="sa-play-btn" id="playBtn_${atomIdx}" onclick="handlePlay(${idxExpr},'${url}')">▶</button>
    <div class="sa-waveform"><div class="sa-waveform-fill" id="wfill_${atomIdx}"></div></div>
  </div>`;
}

function renderSectionHeader(tag, title) {

// ── SUBMIT LOGIC ──────────────────────────────────────
function checkSubmitReady(atomIdx) {
  const btn = document.getElementById(`submitBtn_${atomIdx}`);
  if (!btn) return;
  btn.disabled = !(audioGatePassed[atomIdx] && checkAllAnswered(atomIdx));
}

function checkAllAnswered(atomIdx) {
  for (const r of ['valence','arousal','trustworthiness','action_urge','distinctiveness']) {
    if (!document.querySelector(`input[name="${r}_${atomIdx}"]:checked`)) return false;
  }
  if (!document.querySelector(`[data-attr][data-selected="true"]`)) return false;
  if (!document.querySelector(`[data-ux][data-selected="true"]`)) return false;
  return true;
}

function selectAttr(el) {
  document.querySelectorAll('[data-attr]').forEach(b=>{b.dataset.selected='false';b.classList.remove('selected');});
  el.dataset.selected='true'; el.classList.add('selected');
  checkSubmitReady(parseInt(el.dataset.atomidx));
}
function selectUX(el) {
  document.querySelectorAll('[data-ux]').forEach(b=>{b.dataset.selected='false';b.classList.remove('selected');});
  el.dataset.selected='true'; el.classList.add('selected');
  checkSubmitReady(parseInt(el.dataset.atomidx));
}
function onLikertChange(atomIdx) { checkSubmitReady(atomIdx); }
function getVal(name) { const el=document.querySelector(`input[name="${name}"]:checked`); return el?parseInt(el.value):null; }

function submitAtom(atomIdx) {
  const semScales = STATE.semDiffAssignment[atomIdx];
  const semData = {};
  semScales.forEach(si => { const sc=CONFIG.semDiffScales[si]; semData[sc.id]=getVal(`semdiff_${sc.id}_${atomIdx}`); });
  const attrEl = document.querySelector('[data-attr][data-selected="true"]');
  const confEl = document.querySelector(`input[name="confidence_${atomIdx}"]:checked`);
  const uxEl   = document.querySelector('[data-ux][data-selected="true"]');
  STATE.responses.push(buildResponse(atomIdx, {
    valence: getVal(`valence_${atomIdx}`), arousal: getVal(`arousal_${atomIdx}`),
    trustworthiness: getVal(`trustworthiness_${atomIdx}`), action_urge: getVal(`action_urge_${atomIdx}`),
    distinctiveness: getVal(`distinctiveness_${atomIdx}`),
    attribute: attrEl?attrEl.dataset.attr:null, confidence: confEl?parseInt(confEl.value):null,
    ux_affordance: uxEl?uxEl.dataset.ux:null, sem_diff: semData,
  }));
  STATE.currentAtomIdx++;
  if (STATE.currentAtomIdx < STATE.stimulusOrder.length) {
    if (STATE.currentAtomIdx === STATE.attentionCheckIdx) renderAttentionCheck();
    else renderAtom(STATE.currentAtomIdx);
  } else {
    renderPostTest();
  }
}

function playHuggins() {
  const ctx=getAudioCtx(); let time=ctx.currentTime+0.1;
  hugginsBuffers.forEach(buf=>{ const src=ctx.createBufferSource(); src.buffer=buf; src.connect(ctx.destination); src.start(time); time+=buf.duration+0.3; });
  setTimeout(()=>{ document.getElementById('hugginsOpts').style.display='flex'; }, (hugginsBuffers[0].duration+0.3)*500);
}

  const correct=hugginsSelected===CONFIG.hugginsCorrect; hugginsAttempts++;

  else { if(!correct) STATE.headphoneFlag=true; renderSpectralCheck(false); }
}

let spectralCorrect=null, spectralSelected=null;
function renderSpectralCheck(hardFail) {
  spectralCorrect=Math.floor(Math.random()*3)+1; spectralSelected=null;
  const tones=[440,440,440]; tones[spectralCorrect-1]=880;
  render(`<h2>🎧 Audio Check — Part 2</h2>
    <p style="margin-top:.6rem">Three tones will play. One is a <strong>different pitch</strong>. Which one?</p>
    <button class="sa-submit" style="margin-top:1rem;margin-bottom:1rem" onclick="playSpectral(${JSON.stringify(tones)})">▶ Play tones</button>

    </div>
    <button class="sa-submit" id="spectralSubmit" disabled onclick="submitSpectral(${hardFail})" style="margin-top:.8rem">Confirm →</button>`);
}
function playSpectral(tones) {
  const ctx=getAudioCtx(); let time=ctx.currentTime+0.1;
  tones.forEach(freq=>{ const osc=ctx.createOscillator(),gain=ctx.createGain(); osc.frequency.value=freq; osc.connect(gain); gain.connect(ctx.destination); gain.gain.setValueAtTime(0.2,time); gain.gain.exponentialRampToValueAtTime(0.001,time+0.8); osc.start(time); osc.stop(time+0.8); time+=1.1; });
  setTimeout(()=>{ document.getElementById('spectralOpts').style.display='flex'; },1500);
}
function selectSpectral(n,el) { document.querySelectorAll('.sa-hp-btn').forEach(b=>b.classList.remove('selected')); el.classList.add('selected'); spectralSelected=n; document.getElementById('spectralSubmit').disabled=false; }

// ── END + RETRY LOGIC ────────────────────────────────
async function postWithRetry(data, attempts = 3) {
  for (let i = 0; i < attempts; i++) {
    try {
      const res = await fetch(CONFIG.backendURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (res.ok) return true;
      if (res.status === 422) return false; // validačná chyba — retry nepomôže
    } catch (e) {
      if (i === attempts - 1) return false;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
  return false;
}

async function renderEnd() {
  const finalData = {
    prolific_pid: STATE.prolificPID,
    study_id: STATE.studyID,
    session_id: STATE.sessionID,
    source: STATE.source,
    sensitivity: STATE.sensitivity,
    headphone_flag: STATE.headphoneFlag ? 1 : 0,
    attention_flag: STATE.attentionFlag ? 1 : 0,
    post_test: STATE.postTest,
    responses: STATE.responses,
    completed_at: new Date().toISOString(),
  };

  const dupResp = STATE.responses.filter(r=>r.is_duplicate);
  const origResp = STATE.responses.find(r=>r.cell===STATE.duplicateSource.cell&&r.var===STATE.duplicateSource.var&&!r.is_duplicate);
  if (dupResp.length&&origResp) {
    const dV=Math.abs((dupResp[0].valence||0)-(origResp.valence||0));
    const dA=Math.abs((dupResp[0].arousal||0)-(origResp.arousal||0));
    finalData.duplicate_delta_valence=dV;
    finalData.duplicate_delta_arousal=dA;
    finalData.hard_flag = (dV>3&&dA>3) ? 1 : 0;
  }

  // Zobraziť loading stav
  render(`<div class="sa-rest"><div class="big">⏳</div><h2>Saving your responses…</h2></div>`);

  const ok = await postWithRetry(finalData);

  const isProlific = STATE.source === 'prolific';

  if (!ok) {
    render(`
      <div class="sa-rest">
        <div class="big">⚠️</div>
        <h2>Could not save responses</h2>
        <p style="margin-top:.8rem">There was a problem saving your data. Please try again.</p>
        <button class="sa-submit" style="margin-top:1.5rem" onclick="renderEnd()">Try again →</button>
        ${isProlific ? `<p style="margin-top:1rem;font-size:.82rem;color:var(--muted)">If the problem persists, please contact the research team before completing on Prolific.</p>` : ''}
      </div>
    `);
    return;
  }

  render(isProlific ? `
    <div class="sa-rest">
      <div class="big">🎉</div>
      <h2>Thank you!</h2>
      <p style="margin-top:.8rem">Your responses have been recorded. Please click below to complete your submission on Prolific.</p>
      <button class="sa-submit" style="margin-top:1.5rem" onclick="window.location.href='${CONFIG.prolificCompleteURL}'">Complete on Prolific →</button>
    </div>
  ` : `
    <div class="sa-rest">
      <div class="big">🎉</div>
      <h2>Thank you!</h2>
      <p style="margin-top:.8rem">Your responses have been recorded and will contribute to research on sound perception.</p>
      <p style="margin-top:.8rem">If you'd like to share this study:</p>
      <div style="background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;font-size:.82rem;color:#7dd3fc;margin:.6rem 0;word-break:break-all;">https://study.doremifo.com</div>
      <button class="sa-submit" style="margin-top:1rem;background:#334155" onclick="navigator.clipboard.writeText('https://study.doremifo.com').then(()=>this.textContent='✅ Copied!')">Copy link to share</button>
    </div>
  `);
}

renderWelcome();
</script>
</body>
</html>
