<style>
:root{
  --bg:#ffffff;--tertiary:#f5f4f1;--text:#1a1a1a;--muted:#666666;--faint:#999999;
  --border:#e2e2e2;--border-hi:#c8c8c8;
  --sans:'Syne',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'SFMono-Regular','Consolas',monospace;
  --ok-bg:#f0fdf4;--ok-text:#166534;--ok-border:#bbf7d0;
  --err-bg:#fff1f2;--err-text:#9f1239;--err-border:#fecdd3;
  --warn-bg:#fffbeb;--warn-text:#92400e;--warn-border:#fde68a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--body);background:var(--bg);color:var(--text);font-size:1rem;line-height:1.75;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem;}
.sa-card{background:var(--bg);border:1px solid var(--border);border-radius:.75rem;padding:2rem 2.2rem;width:100%;max-width:680px;}
@media(max-width:560px){.sa-card{padding:1.4rem 1.2rem;}}
.sa-card h2{font-family:var(--sans);font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:.4rem;line-height:1.2;}
.sa-card h3{font-family:var(--sans);font-size:1rem;font-weight:700;color:var(--text);}
.sa-card p,.sa-card li{color:var(--muted);font-size:.9rem;line-height:1.65;}
.sa-card ul{padding-left:1.3rem;margin-top:.5rem;}
.sa-card strong{color:var(--text);}
.sa-progress{background:var(--tertiary);border-radius:99px;height:4px;margin-bottom:1.4rem;overflow:hidden;border:1px solid var(--border);}
.sa-progress-bar{background:var(--text);height:4px;border-radius:99px;transition:width .4s;}
.sa-section-header{border-left:2px solid var(--border-hi);padding:.35rem 0 .35rem .9rem;margin-bottom:1.2rem;}
.sa-section-tag{font-size:.68rem;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-weight:600;font-family:var(--mono);margin-bottom:.1rem;}
.sa-divider{border:none;border-top:1px solid var(--border);margin:1.6rem 0;}
.sa-mini-player{background:var(--tertiary);border:1px solid var(--border);border-radius:.75rem;padding:.75rem 1rem;display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;transition:border-color .2s;}
.sa-mini-player:hover{border-color:var(--border-hi);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.sa-mini-play-btn{width:34px;height:34px;border-radius:50%;background:var(--text);border:none;cursor:pointer;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s;font-size:.85rem;}
.sa-mini-play-btn:hover{opacity:.75;}
.sa-mini-label{font-size:.75rem;color:var(--muted);flex:1;}
.sa-mini-label strong{color:var(--text);font-size:.78rem;}
.sa-mini-waveform{width:80px;height:20px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0;}
.sa-mini-waveform-fill{height:100%;background:var(--text);opacity:.25;width:0%;transition:width .1s linear;}
.sa-player{background:var(--tertiary);border:1px solid var(--border);border-radius:.75rem;padding:.9rem 1.2rem;display:flex;align-items:center;gap:1rem;margin:.8rem 0;transition:border-color .2s;}
.sa-player:hover{border-color:var(--border-hi);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.sa-play-btn{width:42px;height:42px;border-radius:50%;background:var(--text);border:none;cursor:pointer;font-size:1rem;color:#fff;flex-shrink:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;}
.sa-play-btn:hover{opacity:.75;}
.sa-play-btn:disabled{background:var(--border);cursor:not-allowed;}
.sa-waveform{flex:1;height:28px;background:var(--border);border-radius:4px;overflow:hidden;}
.sa-waveform-fill{height:100%;background:var(--text);opacity:.2;width:0%;transition:width .1s linear;}
.sa-play-hint{font-size:.75rem;color:var(--faint);text-align:center;margin-bottom:.5rem;font-family:var(--mono);}
.sa-slider-block{margin-bottom:1.6rem;}
.sa-slider-label{font-size:.72rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem;font-weight:600;font-family:var(--mono);}
.sa-slider-question{font-size:.88rem;color:var(--text);margin-bottom:.8rem;font-style:italic;}
.sa-slider-anchors{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:.4rem;}
.sa-slider-anchors span{max-width:42%;line-height:1.3;}
.sa-slider-anchors span:last-child{text-align:right;}
input[type=range].sa-slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:var(--border);outline:none;cursor:pointer;display:block;}
input[type=range].sa-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--text);border:2px solid var(--bg);cursor:pointer;}
input[type=range].sa-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--text);border:2px solid var(--bg);cursor:pointer;}
/* Arousal slider: blue (calming) → gray → red (activating) */
input[type=range].sa-slider.sa-arousal{background:linear-gradient(to right,#3b82f6,#d1d5db 50%,#ef4444);}
.sa-slider-ticks{display:flex;justify-content:space-between;padding:0 2px;margin-top:.25rem;}
.sa-slider-ticks span{font-size:.62rem;color:var(--faint);font-family:var(--mono);}
.sa-slider-val{text-align:center;font-family:var(--sans);font-weight:700;font-size:1.05rem;color:var(--text);margin-top:.35rem;}
.sa-slider-uni-anchors{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:.4rem;}
.sa-likert-block{margin-bottom:1.4rem;}
.sa-likert-label{font-size:.72rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem;font-weight:600;font-family:var(--mono);}
.sa-likert-row{display:flex;align-items:center;gap:.5rem;}
.sa-likert-anchor{font-size:.78rem;color:var(--muted);min-width:58px;line-height:1.3;}
.sa-likert-anchor.right{text-align:right;}
.sa-likert-options{display:flex;gap:.3rem;flex:1;justify-content:center;}
.sa-likert-options input[type=radio]{display:none;}
.sa-likert-options label{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--faint);cursor:pointer;transition:border-color .15s,color .15s;user-select:none;}
.sa-likert-options input[type=radio]:checked+label{background:var(--text);border-color:var(--text);color:#fff;font-weight:700;}
.sa-likert-options label:hover{border-color:var(--border-hi);color:var(--text);}
.sa-submit{width:100%;padding:.65rem 1.5rem;background:var(--text);color:#fff;border:none;border-radius:99px;font-size:.92rem;font-weight:600;font-family:var(--body);cursor:pointer;transition:opacity .2s;margin-top:1rem;}
.sa-submit:hover:not(:disabled){opacity:.8;}
.sa-submit:disabled{background:var(--tertiary);color:var(--border-hi);border:1px solid var(--border);cursor:not-allowed;}
.sa-hp-options{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap;}
.sa-hp-btn{flex:1;min-width:80px;padding:.6rem;border-radius:99px;border:1.5px solid var(--border-hi);background:transparent;color:var(--text);font-size:.88rem;font-family:var(--body);cursor:pointer;text-align:center;transition:border-color .2s;}
.sa-hp-btn:hover{border-color:var(--text);}
.sa-hp-btn.selected{border-color:var(--text);background:var(--tertiary);font-weight:600;}
.sa-vol-options,.sa-attention-options{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap;}
.sa-vol-btn,.sa-attention-btn{flex:1;padding:.55rem;border-radius:99px;border:1.5px solid var(--border-hi);background:transparent;color:var(--text);font-size:.83rem;font-family:var(--body);cursor:pointer;text-align:center;transition:border-color .2s;}
.sa-vol-btn:hover,.sa-attention-btn:hover{border-color:var(--text);}
.sa-vol-btn.selected,.sa-attention-btn.selected{border-color:var(--text);background:var(--tertiary);font-weight:600;}
.sa-cal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.7rem;margin:.8rem 0;}
.sa-cal-card{background:var(--tertiary);border:1px solid var(--border);border-radius:.75rem;padding:.9rem 1rem;text-align:center;transition:border-color .2s;}
.sa-cal-card.played{border-color:var(--border-hi);}
.cc-score{font-family:var(--mono);font-size:.68rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;}
.cc-val{font-family:var(--sans);font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.2rem;}
.cc-desc{font-size:.75rem;color:var(--muted);margin-bottom:.5rem;line-height:1.4;}
.cc-play{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:99px;border:1.5px solid var(--border-hi);background:transparent;color:var(--text);font-size:.75rem;font-family:var(--body);cursor:pointer;transition:border-color .2s;}
.cc-play:hover{border-color:var(--text);}
.cc-play.playing{background:var(--text);color:#fff;border-color:var(--text);}
.sa-r1-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-top:.5rem;}
.sa-r1-btn{padding:.5rem .4rem;border-radius:.5rem;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:.82rem;font-family:var(--body);cursor:pointer;text-align:center;transition:border-color .15s;}
.sa-r1-btn:hover{border-color:var(--border-hi);}
.sa-r1-btn.selected{border-color:var(--text);background:var(--tertiary);font-weight:500;}
.sa-attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.5rem;}
.sa-attr-btn{padding:.55rem .75rem;border-radius:.5rem;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:.83rem;font-family:var(--body);cursor:pointer;text-align:left;transition:border-color .15s;}
.sa-attr-btn:hover{border-color:var(--border-hi);}
.sa-attr-btn.selected{border-color:var(--text);background:var(--tertiary);font-weight:500;}
.sa-attr-btn.positive{border-left:3px solid var(--ok-text);}
.sa-attr-btn.neutral{border-left:3px solid var(--border-hi);}
.sa-attr-btn.negative{border-left:3px solid var(--err-text);}
.sa-attr-btn.escape{border-left:3px solid var(--warn-text);}
.lang-switch{display:flex;gap:.4rem;margin-bottom:1.4rem;}
.lang-btn{padding:.3rem .8rem;border-radius:99px;border:1.5px solid var(--border-hi);background:transparent;color:var(--muted);font-size:.78rem;font-family:var(--body);cursor:pointer;transition:all .15s;}
.lang-btn.active{border-color:var(--text);background:var(--text);color:#fff;font-weight:600;}
.sa-select{width:100%;padding:.55rem .8rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:.5rem;font-size:.88rem;font-family:var(--body);margin-top:.4rem;appearance:none;transition:border-color .2s;}
.sa-select:hover{border-color:var(--border-hi);}
.sa-rest{text-align:center;padding:1.5rem 0;}
.sa-rest .big{font-size:2.4rem;margin-bottom:.6rem;}
.sa-rest h2{font-family:var(--sans);font-size:1.4rem;}
.sa-meta{font-family:var(--mono);font-size:.72rem;color:var(--faint);margin-bottom:1.2rem;}
.sa-note{font-size:.75rem;color:var(--faint);margin-top:-.3rem;margin-bottom:1rem;line-height:1.55;}
.share-url-box{background:var(--tertiary);border:1px solid var(--border);border-radius:.5rem;padding:.65rem 1rem;font-family:var(--mono);font-size:.82rem;color:var(--text);margin:.6rem 0;word-break:break-all;}
.sa-consent-check{display:flex;align-items:flex-start;gap:.6rem;margin-top:1rem;}
.sa-consent-check input[type=checkbox]{margin-top:.35rem;width:18px;height:18px;accent-color:var(--text);flex-shrink:0;}
.sa-consent-check label{font-size:.85rem;color:var(--muted);line-height:1.55;cursor:pointer;}
</style>
</head>

/* ═══════════════════════════ BUILD ORDER (quota-aware) ═══════════════════════════ */
/*
 * Backend endpoint: GET /assignment?session_id=...&study_id=...
 * Returns: { stimuli: [{cell:"03",var:"07"}, ...] }
 * Backend picks the 3 cell×var combos with the fewest existing ratings → balanced coverage.
 * If backend is unreachable, falls back to local random (acceptable for social/pilot).
 */
async function fetchAssignment(){
  try{
    const url=`${CONFIG.assignmentURL}?session_id=${encodeURIComponent(STATE.sessionID)}&study_id=${encodeURIComponent(STATE.studyID)}`;
    const ac=new AbortController();const tm=setTimeout(()=>ac.abort(),5000);
    const r=await fetch(url,{signal:ac.signal});clearTimeout(tm);
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    if(data.stimuli&&data.stimuli.length>=CONFIG.stimPerParticipant)return data;
  }catch(e){console.warn('Assignment fetch failed, using local random:',e);}
  return null;
}

function buildStimulusOrderLocal(){
  const allCells=shuffle([...CONFIG.cells]);
  return allCells.slice(0,CONFIG.stimPerParticipant).map(c=>({cell:c,var:CONFIG.vars[Math.floor(Math.random()*CONFIG.vars.length)]}));
}

async function buildStimulusOrder(){
  const assignment=await fetchAssignment();
  let picked;
  if(assignment){
    picked=assignment.stimuli.slice(0,CONFIG.stimPerParticipant).map(s=>({
      cell:String(s.cell).replace(/^CELL/i,''),
      var:String(s.var).replace(/^VAR/i,'')
    }));
    STATE.assignmentSource='backend';
  }else{
    picked=buildStimulusOrderLocal();
    STATE.assignmentSource='random';
  }
  STATE.stimulusOrder=picked;
  // Attention check: random after 2nd or 3rd stimulus (indices 1–2)
  STATE.attentionCheckIdx=1+Math.floor(Math.random()*2);
  // Rotation: 5 blocks (R1 + SD0–SD3), 2 per stimulus
  const B=['R1','SD0','SD1','SD2','SD3'];
  STATE.rotationAssignment=STATE.stimulusOrder.map(()=>{const s=shuffle(B);return[s[0],s[1]];});
}
// NOTE: buildStimulusOrder() is called async after consent, not at page load

let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
let currentAudio=null,gateTimer=null,gatePassed={};

function handlePlay(idx,url){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById(`playBtn_${idx}`),fill=document.getElementById(`wfill_${idx}`);
  if(!btn)return;
  const a=new Audio(url);currentAudio=a;
  btn.textContent='⏸';
  btn.onclick=()=>{a.pause();btn.textContent='▶';btn.onclick=()=>handlePlay(idx,url);};
  if(fill)a.addEventListener('timeupdate',()=>{if(a.duration)fill.style.width=(a.currentTime/a.duration*100)+'%';});
  a.addEventListener('ended',()=>{btn.textContent='▶';btn.onclick=()=>handlePlay(idx,url);if(fill)fill.style.width='100%';syncMini(idx,false);});
  a.play().catch(e=>console.warn(e));
  syncMini(idx,true);
  if(idx!=='baseline'&&!gatePassed[idx]){clearTimeout(gateTimer);gateTimer=setTimeout(()=>{gatePassed[idx]=true;checkReady(idx);},2000);}
}
function syncMini(idx,p){document.querySelectorAll(`[data-mini="${idx}"]`).forEach(b=>b.textContent=p?'⏸':'▶');}
function handleMiniPlay(idx,url){handlePlay(idx,url);}

function miniPlayer(idx,url){const ie=typeof idx==='string'?`'${idx}'`:idx;return`<div class="sa-mini-player"><button class="sa-mini-play-btn" data-mini="${idx}" onclick="handleMiniPlay(${ie},'${url}')">▶</button><div class="sa-mini-label"><strong>${T('atom_replay')}</strong></div><div class="sa-mini-waveform"><div class="sa-mini-waveform-fill" id="miniwf_${idx}"></div></div></div>`;}

/* Synth tones for Module 0 */
function playCalTone(type,btnEl){
  const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  document.querySelectorAll('.cc-play').forEach(b=>{b.classList.remove('playing');b.textContent=T('cal_play');});
  if(btnEl){btnEl.classList.add('playing');btnEl.textContent=T('cal_playing');}
  const card=btnEl?.closest('.sa-cal-card');if(card){card.classList.add('played');checkCalReady();}
  const D=2.5;
  function osc(f,w,v,t0,t1){const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;o.type=w;o.connect(g);g.connect(ctx.destination);const t=ctx.currentTime+t0;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.05);g.gain.setValueAtTime(v,t+t1-.15);g.gain.linearRampToValueAtTime(0,t+t1);o.start(t);o.stop(t+t1);}
  if(type==='valence_low')[220,233,247,440,466].forEach((f,i)=>osc(f,i%2?'square':'sawtooth',.05,0,D));
  else if(type==='valence_high')[261.6,329.6,392].forEach(f=>osc(f,'sine',.11,0,D));
  else if(type==='arousal_low')osc(180,'sine',.14,0,D);
  else if(type==='arousal_high'){for(let i=0;i<10;i++){const o2=ctx.createOscillator(),g2=ctx.createGain();o2.frequency.value=440+(i%2)*220;o2.type='square';o2.connect(g2);g2.connect(ctx.destination);const t=ctx.currentTime+i*.22;g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.07,t+.02);g2.gain.setValueAtTime(.07,t+.1);g2.gain.linearRampToValueAtTime(0,t+.13);o2.start(t);o2.stop(t+.14);}}
  else if(type==='actionurge_low')[55,58].forEach(f=>osc(f,'sawtooth',.09,0,D));
  else if(type==='actionurge_neutral')osc(330,'sine',.11,0,D);
  else if(type==='actionurge_high')[880,1100,1320].forEach((f,i)=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.frequency.value=f;o2.type='sine';o2.connect(g2);g2.connect(ctx.destination);const t=ctx.currentTime+i*.1;g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.11,t+.02);g2.gain.exponentialRampToValueAtTime(.001,t+.35);o2.start(t);o2.stop(t+.35);});
  setTimeout(()=>document.querySelectorAll('.cc-play').forEach(b=>{b.classList.remove('playing');b.textContent=T('cal_play');}),(D+.2)*1000);
}
function checkCalReady(){const c=document.querySelectorAll('.sa-cal-card'),all=[...c].every(x=>x.classList.contains('played')),btn=document.getElementById('calContinue');if(btn)btn.disabled=!all;}

/* Huggins */
function genHuggins(){const ctx=getCtx(),D=1.5,sr=ctx.sampleRate,bufs=[];const ci=Math.floor(Math.random()*3);CONFIG.hugginsCorrect=ci+1;for(let s=0;s<3;s++){const buf=ctx.createBuffer(2,sr*D,sr),L=buf.getChannelData(0),R=buf.getChannelData(1);for(let i=0;i<L.length;i++){const n=(Math.random()*2-1)*.3;L[i]=n;R[i]=n;}if(s===ci)for(let i=0;i<L.length;i++){const tone=Math.sin(2*Math.PI*600*(i/sr))*.15;L[i]+=tone;R[i]-=tone;}bufs.push(buf);}return bufs;}

function sliderUnipolar(id,l,r,hdr,q){
  const ticks=[1,2,3,4,5,6,7];
  return`<div class="sa-slider-block" id="wrap_${id}"><div class="sa-slider-label">${hdr}</div>${q?`<p class="sa-slider-question">${q}</p>`:''}<div class="sa-slider-uni-anchors"><span>${l}</span><span>${r}</span></div><input type="range" class="sa-slider" id="${id}" min="1" max="7" step="1" value="4" oninput="onUnipolarInput('${id}')"><div class="sa-slider-ticks">${ticks.map(n=>`<span>${n}</span>`).join('')}</div><div class="sa-slider-val" id="${id}_val" style="color:var(--faint)">—</div></div>`;
}
function onUnipolarInput(id){const v=parseInt(document.getElementById(id).value);document.getElementById(id+'_val').textContent=String(v);document.getElementById(id+'_val').style.color='var(--text)';document.getElementById('wrap_'+id)?.setAttribute('data-touched','1');checkReady(STATE.currentAtomIdx);}

function likert7(id,l,r,label){const opts=[1,2,3,4,5,6,7].map(i=>`<input type="radio" name="${id}" id="${id}_${i}" value="${i}"><label for="${id}_${i}">${i}</label>`).join('');return`<div class="sa-likert-block"><div class="sa-likert-label">${label}</div><div class="sa-likert-row"><span class="sa-likert-anchor">${l}</span><div class="sa-likert-options">${opts}</div><span class="sa-likert-anchor right">${r}</span></div></div>`;}

/* ═══════════════════════════ CHECK READY ═══════════════════════════ */
function checkReady(idx){const btn=document.getElementById(`submitBtn_${idx}`);if(!btn)return;btn.disabled=!(gatePassed[idx]&&allAnswered(idx));}
function isTouched(id){return document.getElementById('wrap_'+id)?.getAttribute('data-touched')==='1';}
function allAnswered(idx){
  if(!isTouched(`val_${idx}`)||!isTouched(`ar_${idx}`)||!isTouched(`au_${idx}`)||!isTouched(`di_${idx}`))return false;
  const rot=STATE.rotationAssignment[idx];
  for(const block of rot){
    if(block==='R1'){
      if(!document.querySelector(`[data-r1ux][data-ai="${idx}"][data-selected="true"]`))return false;
      if(!document.querySelector(`[data-r1attr][data-ai="${idx}"][data-selected="true"]`))return false;
    }else{
      const sc=T('semdiff_scales')[parseInt(block.replace('SD',''))];
      if(!document.querySelector(`input[name="sd_${sc.id}_${idx}"]:checked`))return false;
    }
  }
  return true;
}

/* ═══════════════════════════ HUGGINS ═══════════════════════════ */
let hugginsBuffers=null,hugginsSelected=null,hugginsAttempts=0;
function renderHeadphoneCheck(){
  hugginsBuffers=genHuggins();hugginsSelected=null;
  render(`<h2>${T('hp_title')}</h2><p style="margin-top:.6rem">${T('hp_intro')}</p><p style="margin-top:.8rem">${T('hp_task')}</p>
    <p class="sa-meta" style="margin-top:.6rem">${T('hp_attempt')} ${hugginsAttempts+1} ${T('hp_of')} 2</p>
    <button class="sa-submit" style="margin-top:1rem;margin-bottom:1rem" onclick="playHuggins()">${T('hp_play')}</button>
    <div class="sa-hp-options" id="hugginsOpts" style="display:none"><button class="sa-hp-btn" onclick="selHuggins(1,this)">${T('hp_i1')}</button><button class="sa-hp-btn" onclick="selHuggins(2,this)">${T('hp_i2')}</button><button class="sa-hp-btn" onclick="selHuggins(3,this)">${T('hp_i3')}</button></div>
    <button class="sa-submit" id="hugginsSubmit" disabled onclick="submitHuggins()" style="margin-top:.8rem">${T('hp_confirm')}</button>`);
}
function playHuggins(){const ctx=getCtx();let t=ctx.currentTime+.1;hugginsBuffers.forEach(buf=>{const s=ctx.createBufferSource();s.buffer=buf;s.connect(ctx.destination);s.start(t);t+=buf.duration+.3;});setTimeout(()=>{document.getElementById('hugginsOpts').style.display='flex';},(hugginsBuffers[0].duration+.3)*500);}
function selHuggins(n,el){document.querySelectorAll('.sa-hp-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');hugginsSelected=n;document.getElementById('hugginsSubmit').disabled=false;}
function submitHuggins(){const ok=hugginsSelected===CONFIG.hugginsCorrect;hugginsAttempts++;if(!ok&&hugginsAttempts>=2)renderSpectral(true);else{if(!ok)STATE.headphoneFlag=true;renderSpectral(false);}}

/* Spectral */
let spectralCorrect=null,spectralSelected=null;
function renderSpectral(hardFail){
  spectralCorrect=Math.floor(Math.random()*3)+1;spectralSelected=null;
  const tones=[440,440,440];tones[spectralCorrect-1]=880;
  render(`<h2>${T('spec_title')}</h2><p style="margin-top:.6rem">${T('spec_intro')}</p>
    <button class="sa-submit" style="margin-top:1rem;margin-bottom:1rem" onclick="playSpectral(${JSON.stringify(tones)})">${T('spec_play')}</button>
    <div class="sa-hp-options" id="spectralOpts" style="display:none"><button class="sa-hp-btn" onclick="selSpectral(1,this)">${T('spec_t1')}</button><button class="sa-hp-btn" onclick="selSpectral(2,this)">${T('spec_t2')}</button><button class="sa-hp-btn" onclick="selSpectral(3,this)">${T('spec_t3')}</button></div>
    <button class="sa-submit" id="spectralSubmit" disabled onclick="submitSpectral(${hardFail})" style="margin-top:.8rem">${T('hp_confirm')}</button>`);
}
function playSpectral(tones){const ctx=getCtx();let t=ctx.currentTime+.1;tones.forEach(f=>{const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.8);o.start(t);o.stop(t+.8);t+=1.1;});setTimeout(()=>{document.getElementById('spectralOpts').style.display='flex';},1500);}
function selSpectral(n,el){document.querySelectorAll('.sa-hp-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');spectralSelected=n;document.getElementById('spectralSubmit').disabled=false;}
function submitSpectral(hardFail){const ok=spectralSelected===spectralCorrect;if(hardFail&&!ok){STATE.terminated=true;render(`<h2>${T('spec_fail_title')}</h2><p style="margin-top:.8rem">${T('spec_fail_body')}</p>`);return;}if(!ok)STATE.headphoneFlag=true;renderBaseline();}

/* Baseline */
function renderBaseline(){
  render(`<h2>${T('base_title')}</h2><p style="margin-top:.6rem">${T('base_intro')}</p>
    <p class="sa-play-hint" style="margin-top:1rem">${T('base_hint')}</p>
    <div class="sa-player"><button class="sa-play-btn" id="playBtn_baseline" onclick="playBaselineTone()">▶</button><div class="sa-waveform"><div class="sa-waveform-fill" id="wfill_baseline"></div></div></div>
    <div class="sa-vol-options" id="volOpts" style="display:none"><button class="sa-vol-btn" onclick="selectVol('too_quiet',this)">${T('base_quiet')}</button><button class="sa-vol-btn" onclick="selectVol('ok',this)">${T('base_ok')}</button><button class="sa-vol-btn" onclick="selectVol('too_loud',this)">${T('base_loud')}</button></div>

}

/* Sensitivity */
function renderSensitivity(){
  render(`<h2>${T('sens_title')}</h2><p style="margin-top:.6rem">${T('sens_intro')}</p>
    <div style="margin-top:1.2rem">${sliderUnipolar('sensitivity',T('sens_left'),T('sens_right'),'','')}</div>

  sl.oninput=()=>{document.getElementById('sensitivity_val').textContent=sl.value;};
}
function submitSensitivity(){STATE.sensitivity=parseInt(document.getElementById('sensitivity').value);renderModule0(0);}

/* ═══════════════════════════ MODULE 0 ═══════════════════════════ */
function renderModule0(si){
  const scales=T('cal_scales');if(si>=scales.length){renderInstructions();return;}
  const sc=scales[si],prog=Math.round((si/scales.length)*100);
  const cards=sc.tones.map(t=>`<div class="sa-cal-card" id="calcard_${t.id}"><div class="cc-score">Score ${t.score}</div><div class="cc-val">${t.label}</div><div class="cc-desc">${t.desc}</div><button class="cc-play" onclick="playCalTone('${t.id}',this)">${T('cal_play')}</button></div>`).join('');
  render(`<div class="sa-progress"><div class="sa-progress-bar" style="width:${prog}%"></div></div>
    <p class="sa-meta">${T('cal_tag')} · ${sc.tag}</p><h2>${sc.title}</h2>
    <p style="margin-top:.5rem;margin-bottom:1.2rem;font-style:italic;color:var(--muted);font-size:.88rem">${sc.question}</p>
    <div class="sa-cal-grid">${cards}</div><p class="sa-note" style="margin-top:.6rem">${T('cal_note')}</p>
    <button class="sa-submit" id="calContinue" disabled onclick="renderModule0(${si+1})">${si===scales.length-1?T('cal_start'):T('cal_next')}</button>`);
}

/* ═══════════════════════════ INSTRUCTIONS ═══════════════════════════ */
function renderInstructions(){
  render(`<h2>${T('instr_title')}</h2><p style="margin-top:.6rem">${T('instr_intro')}</p>
    <ul style="margin-top:.8rem"><li>${T('instr_li1')}</li><li>${T('instr_li2')}</li><li>${T('instr_li3')}</li></ul>
    <p style="margin-top:.8rem;font-size:.82rem;color:var(--muted)">${T('instr_note')}</p>
    <button class="sa-submit" onclick="renderAtom(0)" style="margin-top:1.2rem">${T('instr_begin')}</button>`);
}

/* ═══════════════════════════ ATOM ═══════════════════════════ */
function renderAtom(idx){
  STATE.currentAtomIdx=idx;STATE.pageTimestamps[idx]=Date.now();
  const stim=STATE.stimulusOrder[idx],url=audioURL(stim.cell,stim.var),total=STATE.stimulusOrder.length,prog=Math.round((idx/total)*100),rot=STATE.rotationAssignment[idx];
  let rotHTML='';
  for(const block of rot){
    if(block==='R1'){rotHTML+=buildR1(idx,url);}
    else{const sc=T('semdiff_scales')[parseInt(block.replace('SD',''))];rotHTML+=`<hr class="sa-divider">${sectionHeader(T('semdiff_tag'),T('semdiff_title'))}${miniPlayer(idx,url)}${likert7(`sd_${sc.id}_${idx}`,sc.left,sc.right,sc.label)}`;}
  }
  render(`<div class="sa-progress"><div class="sa-progress-bar" style="width:${prog}%"></div></div>
    <p class="sa-meta">${T('atom_sound')} ${idx+1} ${T('atom_of')} ${total}</p>
    ${mainPlayer(idx,url)}
    <hr class="sa-divider">${sectionHeader(T('blkA_tag'),T('blkA_title'))}
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem;font-style:italic">${T('blkA_instr')}</p>
    ${miniPlayer(idx,url)}
    ${sliderBipolar(`val_${idx}`,T('blkA_val_left'),T('blkA_val_right'),T('blkA_val_label'),T('blkA_val_q'))}
    ${sliderBipolar(`ar_${idx}`,T('blkA_ar_left'),T('blkA_ar_right'),T('blkA_ar_label'),T('blkA_ar_q'),'sa-arousal')}
    <hr class="sa-divider">${sectionHeader(T('blkB_tag'),T('blkB_title'))}
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem;font-style:italic">${T('blkB_instr')}</p>
    ${miniPlayer(idx,url)}
    ${sliderBipolar(`au_${idx}`,T('blkB_au_left'),T('blkB_au_right'),T('blkB_au_label'),T('blkB_au_q'))}
    <p class="sa-note">${T('blkB_au_note')}</p>
    ${sliderUnipolar(`di_${idx}`,T('blkB_di_left'),T('blkB_di_right'),T('blkB_di_label'),T('blkB_di_q'))}
    ${rotHTML}
    <button class="sa-submit" id="submitBtn_${idx}" disabled onclick="submitAtom(${idx})">${T('submit_sound')} ${idx+1} →</button>`);
  document.querySelectorAll('input[type=radio]').forEach(el=>el.addEventListener('change',()=>checkReady(idx)));
}

function buildR1(idx,url){
  const uxBtns=T('ux_affordances').map(u=>`<button class="sa-r1-btn" data-r1ux="${u.id}" data-selected="false" data-ai="${idx}" onclick="selR1UX(this)">${u.label}</button>`).join('');
  const attrBtns=T('attributes').map(a=>`<button class="sa-attr-btn ${a.type}" data-r1attr="${a.id}" data-selected="false" data-ai="${idx}" onclick="selR1Attr(this)">${a.label}</button>`).join('');
  return`<hr class="sa-divider">${sectionHeader(T('r1_tag'),T('r1_title'))}${miniPlayer(idx,url)}
    <div class="sa-scale-block"><div class="sa-slider-label">${T('r1_step1_label')}</div><p style="font-size:.82rem;color:var(--muted);margin-bottom:.6rem">${T('r1_step1_q')}</p><div class="sa-r1-grid">${uxBtns}</div></div>
    <div class="sa-scale-block" style="margin-top:.8rem"><div class="sa-slider-label">${T('r1_step2_label')}</div><p style="font-size:.82rem;color:var(--muted);margin-bottom:.6rem">${T('r1_step2_q')}</p><div class="sa-attr-grid">${attrBtns}</div></div>`;
}
function selR1UX(el){const ai=el.dataset.ai;document.querySelectorAll(`[data-r1ux][data-ai="${ai}"]`).forEach(b=>{b.dataset.selected='false';b.classList.remove('selected');});el.dataset.selected='true';el.classList.add('selected');checkReady(STATE.currentAtomIdx);}
function selR1Attr(el){const ai=el.dataset.ai;document.querySelectorAll(`[data-r1attr][data-ai="${ai}"]`).forEach(b=>{b.dataset.selected='false';b.classList.remove('selected');});el.dataset.selected='true';el.classList.add('selected');checkReady(STATE.currentAtomIdx);}

/* ═══════════════════════════ SUBMIT ATOM ═══════════════════════════ */
function getSlider(id){const el=document.getElementById(id);return el?parseInt(el.value):null;}
function submitAtom(idx){
  const pageTime=Date.now()-(STATE.pageTimestamps[idx]||Date.now());
  const rot=STATE.rotationAssignment[idx],rotData={rotation_blocks:rot};
  for(const block of rot){
    if(block==='R1'){
      const ux=document.querySelector(`[data-r1ux][data-ai="${idx}"][data-selected="true"]`);
      const attr=document.querySelector(`[data-r1attr][data-ai="${idx}"][data-selected="true"]`);
      rotData.r1_ux=ux?ux.dataset.r1ux:null;rotData.r1_attr=attr?attr.dataset.r1attr:null;
    }else{const sc=T('semdiff_scales')[parseInt(block.replace('SD',''))];const ch=document.querySelector(`input[name="sd_${sc.id}_${idx}"]:checked`);rotData[`sd_${sc.id}`]=ch?parseInt(ch.value):null;}
  }
  const stim=STATE.stimulusOrder[idx];
  STATE.responses.push({prolific_pid:STATE.prolificPID,study_id:STATE.studyID,session_id:STATE.sessionID,
    atom_index:idx,cell:stim.cell,var:stim.var,lang:LANG,
    valence:getSlider(`val_${idx}`),arousal:getSlider(`ar_${idx}`),action_urge:getSlider(`au_${idx}`),distinctiveness:getSlider(`di_${idx}`),
    page_time_ms:pageTime,...rotData,timestamp:Date.now()});
  STATE.currentAtomIdx++;const next=STATE.currentAtomIdx;
  if(next>=STATE.stimulusOrder.length){renderPostTest();return;}
  if(next===STATE.attentionCheckIdx){renderAttentionCheck();return;}
  renderAtom(next);
}

/* ═══════════════════════════ ATTENTION ═══════════════════════════ */
let attnSel=null;
function renderAttentionCheck(){
  render(`<h2>${T('attn_title')}</h2><p style="margin-top:.8rem">${T('attn_body')}</p>
    <div class="sa-attention-options">${[1,2,3,4,5].map(n=>`<button class="sa-attention-btn" onclick="selAttn(${n},this)">${n}</button>`).join('')}</div>
    <button class="sa-submit" id="attnSubmit" disabled onclick="submitAttn()" style="margin-top:1rem">${T('attn_continue')}</button>`);
}
function selAttn(n,el){document.querySelectorAll('.sa-attention-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');attnSel=n;document.getElementById('attnSubmit').disabled=false;}
function submitAttn(){if(attnSel!==3)STATE.attentionFlag=true;renderAtom(STATE.currentAtomIdx);}

/* ═══════════════════════════ POST-TEST ═══════════════════════════ */
function renderPostTest(){
  const sel=k=>`<select class="sa-select" id="${k}"><option value="">—</option>${T(k+'_opts').map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}</select>`;
  render(`<h2>${T('post_title')}</h2><p style="margin-top:.6rem;margin-bottom:1.4rem">${T('post_intro')}</p>
    <div class="sa-slider-block"><div class="sa-slider-label">${T('post_hp_label')}</div>${sel('post_hp')}</div>
    <div class="sa-slider-block"><div class="sa-slider-label">${T('post_mus_label')}</div>${sel('post_mus')}</div>
    <div class="sa-slider-block"><div class="sa-slider-label">${T('post_exp_label')}</div>${sel('post_exp')}</div>
    <button class="sa-submit" onclick="submitPostTest()">${T('post_submit')}</button>`);
}
function submitPostTest(){STATE.postTest={headphones:document.getElementById('post_hp').value,music_training:document.getElementById('post_mus').value,sound_exposure:document.getElementById('post_exp').value};renderEnd();}

/* ═══════════════════════════ END ═══════════════════════════ */
async function postWithRetry(data,n=3){for(let i=0;i<n;i++){try{const r=await fetch(CONFIG.backendURL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(r.ok)return await r.json();if(r.status===422)return false;}catch(e){if(i===n-1)return false;await new Promise(r=>setTimeout(r,1000*(i+1)));}}return false;}

async function renderEnd(){
  const payload={prolific_pid:STATE.prolificPID,study_id:STATE.studyID,session_id:STATE.sessionID,
    source:STATE.source,lang:LANG,sensitivity:STATE.sensitivity,
    assignment_source:STATE.assignmentSource||'random',
    headphone_flag:STATE.headphoneFlag?1:0,attention_flag:STATE.attentionFlag?1:0,
    post_test:STATE.postTest,responses:STATE.responses,completed_at:new Date().toISOString()};
  render(`<div class="sa-rest"><div class="big">${T('saving')}</div><h2>${T('saving_title')}</h2></div>`);
  const result=await postWithRetry(payload);
  const ok=result!==false&&result!==null;
  const completionUrl=result?.completion_url||CONFIG.prolificCompletionURL;
  const isProlific=STATE.source==='prolific';
  if(!ok){render(`<div class="sa-rest"><div class="big">⚠️</div><h2>${T('err_title')}</h2><p style="margin-top:.8rem">${T('err_body')}</p><button class="sa-submit" style="margin-top:1.5rem" onclick="renderEnd()">${T('err_retry')}</button>${isProlific?`<p style="margin-top:1rem;font-size:.82rem;color:var(--muted)">${T('err_prolific')}</p>`:''}</div>`);return;}
  markDone(STATE.sessionID);
  render(isProlific?`<div class="sa-rest"><div class="big">${T('done_big')}</div><h2>${T('done_title')}</h2><p style="margin-top:.8rem">${T('done_prolific')}</p><button class="sa-submit" style="margin-top:1.5rem" onclick="window.location.href='${completionUrl}'">${T('done_prolific_btn')}</button></div>`
    :`<div class="sa-rest"><div class="big">${T('done_big')}</div><h2>${T('done_title')}</h2><p style="margin-top:.8rem">${T('done_social')}</p><p style="margin-top:.8rem">${T('done_share')}</p><div class="share-url-box">https://study.doremifo.com</div><button class="sa-submit" style="margin-top:.8rem" onclick="navigator.clipboard.writeText('https://study.doremifo.com').then(()=>this.textContent='${T('done_copied')}')">${T('done_copy')}</button></div>`);
}

renderConsent();
</script>
